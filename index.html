<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR FASHION - Pricing Calculator</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#1a1a1a,#2d2416);
    padding:15px;
    overflow-x:hidden;
}

.container{
    width:100%;
    max-width:100%;
    background:#1e1e1e;
    border-radius:15px;
    padding:20px;
    border:2px solid #d4af37;
}

h1{
    color:#d4af37;
    text-align:center;
    margin-bottom:15px;
}

.input-section input{
    width:100%;
    padding:14px;
    border-radius:8px;
    border:2px solid #444;
    background:#2a2a2a;
    color:#d4af37;
}

.toggle-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
    margin-bottom:10px;
}

.toggle-switch{
    position:relative;
    width:50px;height:25px;
}
.toggle-switch input{display:none;}
.slider{
    position:absolute;
    background:#444;
    border-radius:25px;
    top:0;left:0;right:0;bottom:0;
}
.slider:before{
    content:"";
    position:absolute;
    height:18px;width:18px;
    left:4px;top:3px;
    background:#999;
    border-radius:50%;
    transition:0.3s;
}
input:checked + .slider{
    background:#d4af37;
}
input:checked + .slider:before{
    transform:translateX(24px);
    background:#fff;
}

/* TABLE FIX */
.table-wrapper{
    overflow:hidden;
    border:2px solid #444;
    border-radius:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

th,td{
    padding:8px 6px;
    text-align:center;
    color:#d4af37;
    font-weight:bold;
    word-wrap:break-word;
    white-space:normal;
}

thead{
    background:rgba(212,175,55,0.2);
}

.price{
    font-size:1.1em;
}

/* RESPONSIVE */
@media(max-width:600px){
    th,td{font-size:12px;}
}
</style>

</head>

<body>

<div class="container">
<h1>SR FASHION</h1>

<div class="input-section">
<input id="priceInput" placeholder="Enter values (1000 2000 3000)">
</div>

<!-- GST TOGGLE -->

<div class="toggle-row">
<span style="color:#d4af37;">GST</span>
<label class="toggle-switch">
<input type="checkbox" id="gstToggle" checked>
<span class="slider"></span>
</label>
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th style="width:33%">SALE</th>
<th style="width:34%">PURCHASE</th>
<th style="width:33%">MRP</th>
</tr>
</thead>

<tbody id="result"></tbody>
</table>
</div>

</div>

<script>

function applyGST(val){
    const gstOn=document.getElementById('gstToggle').checked;
    if(!gstOn) return val;

    let rate = val<=2500 ? 0.05 : 0.18;
    return val*(1+rate);
}

function calc(){
    let input=document.getElementById('priceInput').value;
    let values=input.split(/[ ,]+/).map(Number).filter(v=>!isNaN(v));

    let html="";

    values.forEach(v=>{
        let purchase=applyGST(v);
        let sale = purchase*1.25;
        let mrp = sale*2;

        html+=`
        <tr>
        <td class="price">₹${sale.toFixed(0)}</td>
        <td class="price">₹${purchase.toFixed(0)}</td>
        <td class="price">₹${mrp.toFixed(0)}</td>
        </tr>
        `;
    });

    document.getElementById('result').innerHTML=html;
}

document.getElementById('priceInput').addEventListener('input',calc);
document.getElementById('gstToggle').addEventListener('change',calc);

</script>

</body>
</html>
